<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/verify">Verify Identity</a>
            <a href="/status" class="active">Check Status</a>
            <a href="/api-docs">API Documentation</a>
        </nav>
    </header>
    <main class="container mt-5">
        <h1 class="text-primary">Check Verification Status</h1>
        <form id="status-form">
            <div class="mb-3">
                <label for="user_id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user_id" name="user_id" required>
            </div>
            <button type="button" class="btn btn-primary" onclick="checkStatus()">Check Status</button>
        </form>
        <div id="status-result" class="mt-3"></div>
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
