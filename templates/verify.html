<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/verify" class="active">Verify Identity</a>
            <a href="/status">Check Status</a>
            <a href="/api-docs">API Documentation</a>
        </nav>
    </header>
    <main class="container mt-5">
        <h1 class="text-primary">Verify Your Identity</h1>
        <form action="/api/verify" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="user_id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user_id" name="user_id" required>
            </div>
            <div class="mb-3">
                <label for="document_type" class="form-label">Document Type</label>
                <input type="text" class="form-control" id="document_type" name="document_type" required>
            </div>
            <div class="mb-3">
                <label for="file" class="form-label">Upload Document</label>
                <input type="file" class="form-control" id="file" name="file" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
